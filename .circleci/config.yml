# CircleCI configuration for liteRT-LM-Apple.
#
# Triggering policy:
#   This pipeline runs when a pull request is opened against `main`, when
#   commits are pushed to a branch that has an open PR, OR when commits land
#   directly on `main`. The last case keeps the README's CircleCI status
#   badge in sync with the latest main-branch state.
#
#   The gate lives in CircleCI Project Settings -> Advanced -> "Only build
#   pull requests". When that toggle is ON, CircleCI builds:
#     - every push to the default branch (main), AND
#     - every push to a branch that has an open pull request,
#   and skips pushes to other branches that have no open PR. That toggle is
#   the authoritative gate -- with it OFF, every push to every branch will
#   hit this config.
#
# Why the matrix is small (just native macOS):
#   The upstream `GemmaModelConstraintProvider` prebuilt dylibs (pulled via
#   Git LFS from upstream LiteRT-LM) carry a baked iOS-family minOS of 26.2
#   for the iOS-simulator and Mac Catalyst slices. CircleCI's macOS images
#   currently top out at the Xcode 16.x line, which doesn't ship the iOS 26
#   SDK, so iOS Simulator, Mac Catalyst, iOS device, and visionOS Simulator
#   builds of the sample app cannot succeed on cloud CI today.
#
#   Native macOS is the one slice that compiles on Xcode 16 because:
#     - the macOS XCFramework slice has minOS 14.0 (Xcode 16-compatible)
#     - the sample's MACOSX_DEPLOYMENT_TARGET is 14.0
#
#   The other platforms remain validated locally on the developer's machine
#   (which has Xcode 26+). When CircleCI's image catalog ships Xcode 26.x,
#   re-add Catalyst, iOS Simulator, and visionOS Simulator steps below.
#
# What this validates on every PR:
#   - Step 1: ./scripts/buildall.sh -- clones upstream LiteRT-LM at the pinned
#     revision, applies the local export patch, and builds iOS device, iOS
#     sim, and macOS dylibs with bazelisk, then derives Catalyst and visionOS
#     slices via xcrun vtool. Catches upstream-pin breakage and
#     export-patch drift.
#   - Step 2: native-macOS xcodebuild on the sample app against the freshly
#     built XCFrameworks. Catches sample-side regressions for any code that
#     also runs in the macOS-only path (most of it).
#
#   The Bazel build cache is preserved across runs to keep incremental builds
#   in the few-minute range; first ever run is ~30-60 minutes.

version: 2.1

parameters:
  xcode-version:
    type: string
    default: "16.4.0"
    description: "Xcode version available on the CircleCI macOS image."

jobs:
  build-and-validate:
    macos:
      xcode: << pipeline.parameters.xcode-version >>
    resource_class: macos.m1.medium.gen1
    environment:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      # Never block on a TTY prompt -- if anything ever asks for input, fail
      # fast instead of hanging the job.
      GIT_TERMINAL_PROMPT: "0"
    steps:
      - checkout

      - run:
          name: Print toolchain versions
          command: |
            xcodebuild -version
            sw_vers
            uname -a
            git --version

      - run:
          name: Install bazelisk and git-lfs
          command: |
            brew install bazelisk git-lfs
            git lfs install
            bazelisk version || true

      - run:
          name: Neutralize credential helpers and netrc for LFS public-repo fetch
          command: |
            # CircleCI's macOS image authenticates the user's repo checkout via
            # ~/.netrc and/or a credential helper. When git-lfs fetches objects
            # from a *different* public GitHub repo (google-ai-edge/LiteRT-LM),
            # GitHub sees those stale creds and rejects with "Bad credentials"
            # instead of letting the fetch go anonymous.
            #
            # Step 1: append a no-op credential helper override to ~/.gitconfig.
            # The leading empty `helper =` clears any previously-set helper.
            # Pure file write -- no git commands -- so it cannot hang on a
            # keychain prompt the way `git config --global --list` did in
            # pipeline 10.
            cat \<<'EOF' >> "$HOME/.gitconfig"
            [credential]
                helper =
            [credential "https://github.com"]
                helper =
            [credential "https://api.github.com"]
                helper =
            EOF
            echo "Updated ~/.gitconfig:"
            cat "$HOME/.gitconfig"

            # Step 2: blank out ~/.netrc so neither git nor git-lfs sends
            # cached basic-auth credentials for github.com. We move it aside
            # rather than delete so that if the checkout step somehow needs
            # it again later, the user can restore it.
            if [ -f "$HOME/.netrc" ]; then
              echo "Found ~/.netrc; moving aside."
              mv "$HOME/.netrc" "$HOME/.netrc.circleci.bak"
            fi

            # Step 3: also clear any leaked GitHub tokens from the env that
            # git-lfs's batch API helpers might pick up.
            for v in GH_TOKEN GITHUB_TOKEN GH_ENTERPRISE_TOKEN GITHUB_AUTH_TOKEN; do
              if [ -n "$(eval "echo \$$v")" ]; then
                echo "Clearing $v"
              fi
              eval "unset $v" || true
            done

            # Step 4: rewrite ~/.gitconfig so it strips the
            # `[url "ssh://git@github.com"] insteadOf = https://github.com`
            # rule that CircleCI's checkout step injects. That rule rewrites
            # every HTTPS clone to SSH; git-lfs then asks GitHub for an
            # SSH-derived LFS token using CircleCI's deploy key, which only
            # has access to the user's own repo -- so a fetch from a
            # different public repo (google-ai-edge/LiteRT-LM) returns
            # "Bad credentials". We rewrite the file with awk to drop that
            # url section entirely while preserving the LFS filter section.
            awk '
              BEGIN { skip = 0 }
              /^\[url "ssh:\/\/git@github\.com"\]/ { skip = 1; next }
              /^\[/ { skip = 0 }
              skip == 0 { print }
            ' "$HOME/.gitconfig" > "$HOME/.gitconfig.tmp" && mv "$HOME/.gitconfig.tmp" "$HOME/.gitconfig"

            # Diagnostic dump (file-only -- never invoke `git config` here,
            # which can synchronously call the osxkeychain helper and hang
            # forever waiting for a TTY prompt).
            echo "=== /etc/gitconfig (system) ==="
            cat /etc/gitconfig 2>/dev/null || echo "(missing)"
            echo "=== /usr/local/etc/gitconfig (homebrew) ==="
            cat /usr/local/etc/gitconfig 2>/dev/null || echo "(missing)"
            echo "=== /opt/homebrew/etc/gitconfig (Apple Silicon homebrew) ==="
            cat /opt/homebrew/etc/gitconfig 2>/dev/null || echo "(missing)"
            echo "=== ~/.gitconfig (final state) ==="
            cat "$HOME/.gitconfig" 2>/dev/null || echo "(missing)"
            echo "=== ~/.netrc (should be missing now) ==="
            cat "$HOME/.netrc" 2>/dev/null || echo "(missing)"

      - restore_cache:
          keys:
            - litertlm-bazel-cache-v1-{{ checksum "scripts/subscripts/common.sh" }}-{{ checksum "patches/0001-export-ios-shared-engine-dylib.patch" }}
            - litertlm-bazel-cache-v1-{{ checksum "scripts/subscripts/common.sh" }}-
            - litertlm-bazel-cache-v1-

      - run:
          name: Run full rebuild pipeline (buildall.sh)
          command: |
            # Defer LFS smudging until the explicit `git lfs pull` inside
            # clone_upstream.sh. If a single LFS file (e.g. the android_arm64
            # prebuilt we don't need) auth-fails during smudge, the entire
            # clone aborts -- but with smudge skipped, the clone always
            # succeeds and the explicit pull can run anonymously after our
            # netrc / gitconfig neutralization.
            export GIT_LFS_SKIP_SMUDGE=1
            ./scripts/buildall.sh
          no_output_timeout: 60m

      - save_cache:
          key: litertlm-bazel-cache-v1-{{ checksum "scripts/subscripts/common.sh" }}-{{ checksum "patches/0001-export-ios-shared-engine-dylib.patch" }}
          paths:
            - ~/Library/Caches/bazelisk
            - ~/.cache/bazelisk
            - .worktree

      - run:
          name: Verify XCFramework slice manifest
          command: |
            set -eu
            for fw in Artifacts/LiteRTLMEngineCPU.xcframework Artifacts/GemmaModelConstraintProvider.xcframework; do
              echo "==> ${fw}"
              ls "${fw}"
              for slice in ios-arm64 ios-arm64-simulator ios-arm64-maccatalyst macos-arm64 xros-arm64 xros-arm64-simulator; do
                if [ ! -d "${fw}/${slice}" ]; then
                  echo "Missing slice: ${fw}/${slice}" >&2
                  exit 1
                fi
              done
            done

      - run:
          name: Resolve sample SPM dependencies
          command: |
            cd Examples/LiteRTLMAppleExample
            xcodebuild -resolvePackageDependencies -project LiteRTLMAppleExample.xcodeproj

      - run:
          name: Build sample for native macOS
          command: |
            cd Examples/LiteRTLMAppleExample
            xcodebuild \
              -project LiteRTLMAppleExample.xcodeproj \
              -scheme LiteRTLMAppleExample \
              -destination 'platform=macOS' \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY= \
              DEVELOPMENT_TEAM= \
              build | tee /tmp/build-macos.log
          no_output_timeout: 30m

      - run:
          name: SonarQube Cloud scan
          command: |
            # Skip cleanly if SONAR_TOKEN isn't configured (e.g. on a fork
            # PR where CircleCI strips secret env vars). The rest of the
            # pipeline still produces useful output.
            if [ -z "${SONAR_TOKEN:-}" ]; then
              echo "SONAR_TOKEN not set; skipping SonarQube Cloud scan."
              exit 0
            fi

            brew install sonar-scanner

            # When the build is triggered by a PR, point the scanner at
            # the PR so SonarCloud decorates the PR conversation. On main
            # pushes we leave the PR-specific args off so SonarCloud
            # records the result against the main branch.
            EXTRA_ARGS=""
            if [ -n "${CIRCLE_PULL_REQUEST:-}" ]; then
              PR_NUMBER="${CIRCLE_PULL_REQUEST##*/}"
              EXTRA_ARGS="-Dsonar.pullrequest.key=${PR_NUMBER} -Dsonar.pullrequest.branch=${CIRCLE_BRANCH} -Dsonar.pullrequest.base=main"
            else
              EXTRA_ARGS="-Dsonar.branch.name=${CIRCLE_BRANCH}"
            fi

            sonar-scanner \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.token="${SONAR_TOKEN}" \
              ${EXTRA_ARGS}
          no_output_timeout: 15m

      - store_artifacts:
          path: Artifacts
          destination: xcframeworks

      - store_artifacts:
          path: Sources/LiteRTLMApple/include/engine.h
          destination: engine.h

      - store_artifacts:
          path: /tmp/build-macos.log
          destination: build-logs/macos.log

workflows:
  validation:
    # No `when:` filter here: we want this workflow to run on every trigger
    # CircleCI delivers. Branch-level gating is enforced by the "Only build
    # pull requests" project setting (see header comment), which already
    # restricts non-main branches to PR-only and always allows main.
    jobs:
      - build-and-validate
