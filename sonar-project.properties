# SonarQube Cloud project configuration for liteRT-LM-Apple.
# https://sonarcloud.io/project/overview?id=rogerioth_liteRT-LM-Apple

sonar.projectKey=rogerioth_liteRT-LM-Apple
sonar.organization=rogerioth
sonar.projectName=LiteRT-LM-Apple

# What to scan: Swift sources in the package and the SwiftUI sample app, plus
# the C-API shim and public header that ship with the package.
sonar.sources=Sources,Examples

# Source encoding (matches Apple toolchain default).
sonar.sourceEncoding=UTF-8

# Skip generated, vendored, and built artifacts. The .worktree/ directory holds
# the upstream LiteRT-LM clone the rebuild pipeline produces, and Artifacts/
# carries prebuilt XCFramework slices fetched from upstream -- neither is our
# code.
sonar.exclusions=\
    **/Artifacts/**,\
    **/.worktree/**,\
    **/Build/**,\
    **/build/**,\
    **/DerivedData/**,\
    **/Package.resolved,\
    **/.swiftpm/**,\
    **/xcuserdata/**,\
    **/.build/**

# Swift file suffix is the default; declare explicitly so the analyzer
# discovers files even if the IDE drops in non-default extensions later.
sonar.swift.file.suffixes=.swift
